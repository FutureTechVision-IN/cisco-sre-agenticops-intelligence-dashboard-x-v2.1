name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: 'true'
          VITE_STATIC_MODE: 'true'
        run: npm run build:gh-pages

      - name: Copy static data and assets to dist
        run: |
          mkdir -p dist/static-data
          cp -r frontend/public/static-data/* dist/static-data/ 2>/dev/null || true
          cp 404.html dist/404.html 2>/dev/null || true
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false
          commit_message: "Deploy: ${{ github.sha }}"
          exclude_assets: '.github,node_modules,.env,.env.*'

      # Mirror the gh-pages branch to the enterprise remote (Cisco GitHub Enterprise)
      - name: Mirror gh-pages to Enterprise GitHub
        if: success()
        env:
          ENTERPRISE_DEPLOY_KEY: ${{ secrets.ENTERPRISE_DEPLOY_KEY }}
        run: |
          if [ -n "$ENTERPRISE_DEPLOY_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$ENTERPRISE_DEPLOY_KEY" > ~/.ssh/enterprise_deploy
            chmod 600 ~/.ssh/enterprise_deploy
            cat >> ~/.ssh/config <<'EOF'
          Host wwwin-github.cisco.com
              HostName wwwin-github.cisco.com
              User git
              IdentityFile ~/.ssh/enterprise_deploy
              IdentitiesOnly yes
              StrictHostKeyChecking no
          EOF
            git remote add enterprise git@wwwin-github.cisco.com:bipbabu/cisco-sre-agenticops-intelligence-dashboard-x-v2.1.git || true
            GIT_LFS_SKIP_PUSH=1 git push enterprise HEAD:gh-pages --force || echo "Enterprise mirror skipped"
          else
            echo "ENTERPRISE_DEPLOY_KEY not set — skipping enterprise mirror"
          fi
