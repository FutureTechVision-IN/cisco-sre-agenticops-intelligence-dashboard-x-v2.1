name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: 'true'
          VITE_STATIC_MODE: 'true'
        run: npm run build:gh-pages

      - name: Copy static data to dist
        run: |
          mkdir -p dist/static-data
          cp -r frontend/public/static-data/* dist/static-data/ 2>/dev/null || true
          cp 404.html dist/404.html 2>/dev/null || true
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false
          commit_message: "Deploy: ${{ github.sha }}"
          exclude_assets: '.github,node_modules,.env,.env.*'
