version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: cisco-sre-postgres
    environment:
      POSTGRES_DB: cisco_sre_dashboard
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-$(openssl rand -hex 16)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cisco-sre-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-$(openssl rand -hex 16)}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: cisco-sre-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dashboard_user:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cisco_sre_dashboard
      JWT_SECRET: ${JWT_SECRET:-$(openssl rand -hex 32)}
      SESSION_SECRET: ${SESSION_SECRET:-$(openssl rand -hex 32)}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      CISCO_CIRCUIT_API_KEY: ${CISCO_CIRCUIT_API_KEY:-changeme}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: cisco-sre-app
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dashboard_user:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cisco_sre_dashboard
      JWT_SECRET: ${JWT_SECRET:-$(openssl rand -hex 32)}
      SESSION_SECRET: ${SESSION_SECRET:-$(openssl rand -hex 32)}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      CISCO_CIRCUIT_API_KEY: ${CISCO_CIRCUIT_API_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
