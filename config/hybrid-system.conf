#!/bin/bash
# ============================================================================
# CISCO SRE AGENTICOPS HYBRID SYSTEM CONFIGURATION
# Unified configuration for Docker and non-Docker environments
# Version: 2.0.0
# ============================================================================

# ==============================================================================
# SYSTEM IDENTIFICATION
# ==============================================================================
export SYSTEM_NAME="Cisco SRE AgenticOps Intelligence Dashboard"
export SYSTEM_VERSION="2.0.0"
export SYSTEM_ID="cisco-sre-agenticops-x"

# ==============================================================================
# EXECUTION MODE CONFIGURATION
# ==============================================================================
# AUTO: Automatically detect best mode (Docker preferred if available)
# DOCKER: Force Docker mode only
# NATIVE: Force native/non-Docker mode only
# HYBRID: Use Docker for databases, native for application
export EXECUTION_MODE="${EXECUTION_MODE:-AUTO}"

# Docker compose file to use (supports multiple files)
export DOCKER_COMPOSE_FILE="${DOCKER_COMPOSE_FILE:-docker-compose.enhanced.yml}"
export DOCKER_COMPOSE_HYBRID_FILE="${DOCKER_COMPOSE_HYBRID_FILE:-docker-compose.hybrid.yml}"
export DOCKER_PROJECT_NAME="${DOCKER_PROJECT_NAME:-cisco-sre-agenticops-intelligence-dashboard-x-v20}"

# ==============================================================================
# NETWORK CONFIGURATION
# ==============================================================================
# Main application port
export DASHBOARD_PORT="${DASHBOARD_PORT:-8000}"
export DASHBOARD_HOST="${DASHBOARD_HOST:-0.0.0.0}"

# Backend API port (if separate)
export API_PORT="${API_PORT:-5000}"
export API_HOST="${API_HOST:-localhost}"

# Database ports
export POSTGRES_PORT="${POSTGRES_PORT:-5432}"
export POSTGRES_HOST="${POSTGRES_HOST:-localhost}"

# Redis port
export REDIS_PORT="${REDIS_PORT:-6379}"
export REDIS_HOST="${REDIS_HOST:-localhost}"

# AI Engine port
export AI_ENGINE_PORT="${AI_ENGINE_PORT:-5001}"
export AI_ENGINE_HOST="${AI_ENGINE_HOST:-localhost}"

# Port scanning configuration (for finding available ports)
export PORT_SCAN_START="${PORT_SCAN_START:-3000}"
export PORT_SCAN_END="${PORT_SCAN_END:-9999}"
export PORT_SCAN_ENABLED="${PORT_SCAN_ENABLED:-true}"

# ==============================================================================
# DATABASE CONFIGURATION
# ==============================================================================
export POSTGRES_DB="${POSTGRES_DB:-cisco_sre_dashboard}"
export POSTGRES_USER="${POSTGRES_USER:-postgres}"
export POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-postgres}"

# Construct DATABASE_URL if not set
if [[ -z "${DATABASE_URL:-}" ]]; then
    # Use Docker service name if in Docker mode, localhost otherwise
    if [[ "${EXECUTION_MODE}" == "DOCKER" ]]; then
        export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}"
    else
        export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
    fi
fi

# Database connection pool settings
export DB_POOL_MIN="${DB_POOL_MIN:-2}"
export DB_POOL_MAX="${DB_POOL_MAX:-10}"
export DB_CONNECTION_TIMEOUT="${DB_CONNECTION_TIMEOUT:-30000}"
export DB_IDLE_TIMEOUT="${DB_IDLE_TIMEOUT:-10000}"

# ==============================================================================
# REDIS CONFIGURATION
# ==============================================================================
export REDIS_PASSWORD="${REDIS_PASSWORD:-cisco123}"
export REDIS_DB="${REDIS_DB:-0}"

# Construct REDIS_URL if not set
if [[ -z "${REDIS_URL:-}" ]]; then
    if [[ "${EXECUTION_MODE}" == "DOCKER" ]]; then
        export REDIS_URL="redis://:${REDIS_PASSWORD}@redis:${REDIS_PORT}/${REDIS_DB}"
    else
        export REDIS_URL="redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}"
    fi
fi

# ==============================================================================
# APPLICATION CONFIGURATION
# ==============================================================================
export NODE_ENV="${NODE_ENV:-production}"
export LOG_LEVEL="${LOG_LEVEL:-info}"
export METRICS_ENABLED="${METRICS_ENABLED:-true}"
export CACHE_TTL="${CACHE_TTL:-300}"
export API_RATE_LIMIT="${API_RATE_LIMIT:-100}"

# Security settings
export JWT_SECRET="${JWT_SECRET:-cisco-sre-jwt-secret-change-in-production}"
export SESSION_SECRET="${SESSION_SECRET:-cisco-sre-session-secret-change-in-production}"
export CORS_ORIGINS="${CORS_ORIGINS:-*}"

# File paths
export LOG_DIR="${LOG_DIR:-./logs}"
export DATA_DIR="${DATA_DIR:-./data}"
export CONFIG_DIR="${CONFIG_DIR:-./config}"
export STATIC_DATA_DIR="${STATIC_DATA_DIR:-./static-data}"
export CACHE_DIR="${CACHE_DIR:-./cache}"

# ==============================================================================
# RESOURCE LIMITS
# ==============================================================================
# Docker resource limits
export DOCKER_CPU_LIMIT="${DOCKER_CPU_LIMIT:-2.0}"
export DOCKER_MEMORY_LIMIT="${DOCKER_MEMORY_LIMIT:-4G}"
export DOCKER_CPU_RESERVATION="${DOCKER_CPU_RESERVATION:-0.5}"
export DOCKER_MEMORY_RESERVATION="${DOCKER_MEMORY_RESERVATION:-1G}"

# Native mode resource limits (using ulimit)
export NATIVE_MAX_OPEN_FILES="${NATIVE_MAX_OPEN_FILES:-65536}"
export NATIVE_MAX_PROCESSES="${NATIVE_MAX_PROCESSES:-4096}"
export NATIVE_STACK_SIZE="${NATIVE_STACK_SIZE:-8192}"

# Node.js memory settings
export NODE_OPTIONS="${NODE_OPTIONS:---max-old-space-size=4096}"

# ==============================================================================
# HEALTH CHECK CONFIGURATION
# ==============================================================================
export HEALTH_CHECK_ENABLED="${HEALTH_CHECK_ENABLED:-true}"
export HEALTH_CHECK_INTERVAL="${HEALTH_CHECK_INTERVAL:-30}"
export HEALTH_CHECK_TIMEOUT="${HEALTH_CHECK_TIMEOUT:-10}"
export HEALTH_CHECK_RETRIES="${HEALTH_CHECK_RETRIES:-5}"
export HEALTH_CHECK_START_PERIOD="${HEALTH_CHECK_START_PERIOD:-60}"

# Health check endpoints
export HEALTH_CHECK_URL="${HEALTH_CHECK_URL:-http://localhost:${DASHBOARD_PORT}/api/health}"
export DASHBOARD_READINESS_URL="${DASHBOARD_READINESS_URL:-http://localhost:${DASHBOARD_PORT}/}"
export AI_ENGINE_HEALTH_URL="${AI_ENGINE_HEALTH_URL:-http://localhost:${AI_ENGINE_PORT}/health}"

# ==============================================================================
# STARTUP CONFIGURATION
# ==============================================================================
export STARTUP_TIMEOUT="${STARTUP_TIMEOUT:-180}"
export SERVICE_STARTUP_DELAY="${SERVICE_STARTUP_DELAY:-5}"
export DEPENDENCY_WAIT_TIMEOUT="${DEPENDENCY_WAIT_TIMEOUT:-120}"

# Startup order (comma-separated)
export STARTUP_ORDER="${STARTUP_ORDER:-postgres,redis,ai-engine,dashboard}"

# Pre-startup hooks (scripts to run before main startup)
export PRE_STARTUP_HOOKS="${PRE_STARTUP_HOOKS:-}"
export POST_STARTUP_HOOKS="${POST_STARTUP_HOOKS:-}"

# ==============================================================================
# SHUTDOWN CONFIGURATION
# ==============================================================================
export SHUTDOWN_TIMEOUT="${SHUTDOWN_TIMEOUT:-60}"
export GRACEFUL_SHUTDOWN_TIMEOUT="${GRACEFUL_SHUTDOWN_TIMEOUT:-30}"
export FORCE_KILL_TIMEOUT="${FORCE_KILL_TIMEOUT:-10}"

# Shutdown order (comma-separated, reverse of startup)
