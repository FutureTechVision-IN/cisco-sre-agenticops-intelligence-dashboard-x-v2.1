export POST_SHUTDOWN_HOOKS="${POST_SHUTDOWN_HOOKS:-}"

# ==============================================================================
# LOGGING CONFIGURATION
# ==============================================================================
export LOG_FORMAT="${LOG_FORMAT:-json}"
export LOG_ROTATION_ENABLED="${LOG_ROTATION_ENABLED:-true}"
