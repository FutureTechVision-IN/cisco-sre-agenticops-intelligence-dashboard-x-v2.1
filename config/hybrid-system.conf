# Process monitoring
export MONITOR_MEMORY_THRESHOLD="${MONITOR_MEMORY_THRESHOLD:-90}"
export MONITOR_CPU_THRESHOLD="${MONITOR_CPU_THRESHOLD:-80}"
export MONITOR_DISK_THRESHOLD="${MONITOR_DISK_THRESHOLD:-85}"

# ==============================================================================
# AUTO-RESTART CONFIGURATION
# ==============================================================================
export AUTO_RESTART_ENABLED="${AUTO_RESTART_ENABLED:-true}"
export AUTO_RESTART_MAX_RETRIES="${AUTO_RESTART_MAX_RETRIES:-3}"
export AUTO_RESTART_DELAY="${AUTO_RESTART_DELAY:-10}"
export AUTO_RESTART_COOLDOWN="${AUTO_RESTART_COOLDOWN:-300}"

# ==============================================================================
# DEVELOPMENT/DEBUG CONFIGURATION
# ==============================================================================
export DEBUG_MODE="${DEBUG_MODE:-false}"
export VERBOSE_LOGGING="${VERBOSE_LOGGING:-false}"
export DRY_RUN="${DRY_RUN:-false}"
export SKIP_HEALTH_CHECK="${SKIP_HEALTH_CHECK:-false}"
export SKIP_DEPENDENCY_CHECK="${SKIP_DEPENDENCY_CHECK:-false}"

# ==============================================================================
# PLATFORM-SPECIFIC CONFIGURATION
# ==============================================================================
# Detect OS
case "$(uname -s)" in
    Darwin*)
        export PLATFORM="macos"
        export OPEN_CMD="open"
        export SED_INPLACE="sed -i ''"
        ;;
    Linux*)
        export PLATFORM="linux"
        export OPEN_CMD="xdg-open"
        export SED_INPLACE="sed -i"
        ;;
    CYGWIN*|MINGW*|MSYS*)
        export PLATFORM="windows"
        export OPEN_CMD="start"
        export SED_INPLACE="sed -i"
        ;;
    *)
        export PLATFORM="unknown"
        export OPEN_CMD="echo"
        export SED_INPLACE="sed -i"
        ;;
esac

# ==============================================================================
# PID FILE CONFIGURATION
# ==============================================================================
export PID_DIR="${PID_DIR:-./run}"
export DASHBOARD_PID_FILE="${PID_DIR}/dashboard.pid"
export AI_ENGINE_PID_FILE="${PID_DIR}/ai-engine.pid"
export WATCHER_PID_FILE="${PID_DIR}/watcher.pid"

# ==============================================================================
# STATE FILES
# ==============================================================================
export STATE_DIR="${STATE_DIR:-./config/system-state}"
export RUNTIME_STATE_FILE="${STATE_DIR}/runtime-state.json"
export SHUTDOWN_STATE_FILE="${STATE_DIR}/shutdown-state.json"
export STARTUP_STATE_FILE="${STATE_DIR}/startup-state.json"
export LATEST_BACKUP_FILE="${STATE_DIR}/latest-backup.json"

# ==============================================================================
# FEATURE FLAGS
# ==============================================================================
export FEATURE_AI_ENGINE="${FEATURE_AI_ENGINE:-true}"
export FEATURE_REDIS_CACHE="${FEATURE_REDIS_CACHE:-true}"
export FEATURE_CHATBOT="${FEATURE_CHATBOT:-true}"
export FEATURE_ML_ANALYTICS="${FEATURE_ML_ANALYTICS:-true}"
export FEATURE_FIELD_NOTICE_VALIDATION="${FEATURE_FIELD_NOTICE_VALIDATION:-true}"

# ==============================================================================
# UTILITY FUNCTIONS
# ==============================================================================

# Function to detect execution mode
detect_execution_mode() {
    if [[ "${EXECUTION_MODE}" != "AUTO" ]]; then
        echo "${EXECUTION_MODE}"
        return
    fi
    
    # Check if Docker is available and running
    if command -v docker &>/dev/null && docker info &>/dev/null; then
        # Check if we're inside a Docker container
        if [[ -f "/.dockerenv" ]] || grep -q docker /proc/1/cgroup 2>/dev/null; then
            echo "DOCKER"
        else
            # Docker is available, prefer it
            echo "DOCKER"
        fi
    else
        echo "NATIVE"
    fi
}

# Function to check if a port is available
is_port_available() {
    local port="$1"
    ! (lsof -i ":$port" -sTCP:LISTEN &>/dev/null || netstat -tuln 2>/dev/null | grep -q ":$port ")
}

# Function to find next available port
find_available_port() {
    local start_port="${1:-$PORT_SCAN_START}"
    local end_port="${2:-$PORT_SCAN_END}"
    
    for ((port=start_port; port<=end_port; port++)); do
        if is_port_available "$port"; then
            echo "$port"
            return 0
        fi
    done
    
    return 1
}

# Function to validate configuration
validate_config() {
    local errors=0
    
    # Check required ports
    for port_var in DASHBOARD_PORT POSTGRES_PORT REDIS_PORT; do
        local port="${!port_var}"
        if [[ ! "$port" =~ ^[0-9]+$ ]] || [[ "$port" -lt 1 ]] || [[ "$port" -gt 65535 ]]; then
            echo "ERROR: Invalid $port_var: $port" >&2
            ((errors++))
        fi
    done
    
    # Check required directories
    for dir in LOG_DIR DATA_DIR CONFIG_DIR; do
        if [[ ! -d "${!dir}" ]]; then
            mkdir -p "${!dir}" 2>/dev/null || {
                echo "WARNING: Cannot create $dir: ${!dir}" >&2
            }
        fi
    done
    
    return "$errors"
}

# Function to print configuration summary
print_config_summary() {
    echo "=============================================="
    echo "SYSTEM CONFIGURATION SUMMARY"
    echo "=============================================="
    echo "System: ${SYSTEM_NAME}"
    echo "Version: ${SYSTEM_VERSION}"
    echo "Platform: ${PLATFORM}"
    echo "Execution Mode: $(detect_execution_mode)"
    echo "----------------------------------------------"
    echo "Dashboard Port: ${DASHBOARD_PORT}"
    echo "PostgreSQL: ${POSTGRES_HOST}:${POSTGRES_PORT}"
    echo "Redis: ${REDIS_HOST}:${REDIS_PORT}"
    echo "AI Engine: ${AI_ENGINE_HOST}:${AI_ENGINE_PORT}"
    echo "----------------------------------------------"
    echo "Node Environment: ${NODE_ENV}"
    echo "Log Level: ${LOG_LEVEL}"
    echo "Debug Mode: ${DEBUG_MODE}"
    echo "=============================================="
}

# Export detection function result
export DETECTED_MODE="$(detect_execution_mode)"

# Validate on load if not in dry run
if [[ "${DRY_RUN}" != "true" ]] && [[ "${SKIP_VALIDATION:-false}" != "true" ]]; then
    validate_config >/dev/null 2>&1 || true
fi

# ============================================================================
# END OF CONFIGURATION
# ============================================================================
