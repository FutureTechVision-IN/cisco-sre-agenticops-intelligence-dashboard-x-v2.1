<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRE AgenticOps Intelligence Dashboard - Cisco Systems, Inc.</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // This script redirects 404s back to index.html with the path preserved
      // so the client-side router can handle it
      (function() {
        var repo = '/cisco-sre-agenticops-intelligence-dashboard-x-v2.1';
        var fullPath = window.location.pathname;
        // If path starts with the repo name, redirect to index with query param
        if (fullPath.indexOf(repo) === 0) {
          var route = fullPath.replace(repo, '') || '/';
          var search = window.location.search;
          var hash = window.location.hash;
          window.location.replace(
            window.location.origin + repo + '/?spa-redirect=' + encodeURIComponent(route + search + hash)
          );
        } else {
          // Fallback: redirect to root
          window.location.replace(window.location.origin + repo + '/');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>Redirecting to <a href="/cisco-sre-agenticops-intelligence-dashboard-x-v2.1/">SRE AgenticOps Intelligence Dashboard</a>...</p>
    </noscript>
  </body>
</html>
