<!DOCTYPE html>
<html>
<head>
    <title>Authentication Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .test-result { margin: 20px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        input[type="text"], input[type="password"] { 
            width: 200px; 
            padding: 8px; 
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button { 
            padding: 10px 20px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .credentials { background-color: #f8f9fa; padding: 15px; border-radius: 4px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>SRE Dashboard Authentication Test</h1>
    
    <div class="credentials">
        <h3>🔐 Valid Service Account Credentials:</h3>
        <p><strong>Username:</strong> sre-admin, sre-manager, sre-user, sre-vp, sre-director</p>
        <p><strong>Password:</strong> password$$ <em>(exactly two dollar signs)</em></p>
    </div>

    <div class="info test-result">
        <strong>✅ API Authentication Status:</strong> All 5 service accounts are working via API
    </div>

    <h3>Test Login Form</h3>
    <form id="loginForm">
        <div>
            <label>Username:</label><br>
            <input type="text" id="username" value="sre-admin" placeholder="Enter username">
        </div>
        <div>
            <label>Password:</label><br>
            <input type="password" id="password" value="password$$" placeholder="Enter password">
        </div>
        <div style="margin-top: 10px;">
            <button type="submit">Test Login</button>
            <button type="button" onclick="testAllAccounts()">Test All Accounts</button>
        </div>
    </form>

    <div id="results"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            await testLogin(username, password);
        });

        async function testLogin(username, password) {
            const resultsDiv = document.getElementById('results');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.text();
                
                if (response.ok) {
                    const data = JSON.parse(result);
                    resultsDiv.innerHTML = `
                        <div class="success test-result">
                            <strong>✅ LOGIN SUCCESS for ${username}</strong><br>
                            Role: ${data.role}<br>
                            Email: ${data.email}<br>
                            Token: ${data.token ? 'Generated ✓' : 'Missing ✗'}<br>
                            User ID: ${data.userId}
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="error test-result">
                            <strong>❌ LOGIN FAILED for ${username}</strong><br>
                            Status: ${response.status} ${response.statusText}<br>
                            Response: ${result}
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error test-result">
                        <strong>❌ CONNECTION ERROR</strong><br>
                        Error: ${error.message}
                    </div>
                `;
            }
        }

        async function testAllAccounts() {
            const accounts = ['sre-admin', 'sre-manager', 'sre-user', 'sre-vp', 'sre-director'];
            const password = 'password$$';
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<div class="info test-result">Testing all service accounts...</div>';
            
            let results = '<h3>🔍 Complete Authentication Test Results:</h3>';
            
            for (const username of accounts) {
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const result = await response.text();
                    
                    if (response.ok) {
                        const data = JSON.parse(result);
                        results += `
                            <div class="success test-result">
                                ✅ <strong>${username}</strong> (${data.role}) - SUCCESS
                            </div>
                        `;
                    } else {
                        results += `
                            <div class="error test-result">
                                ❌ <strong>${username}</strong> - FAILED (${response.status})
                            </div>
                        `;
                    }
                } catch (error) {
                    results += `
                        <div class="error test-result">
                            ❌ <strong>${username}</strong> - ERROR: ${error.message}
                        </div>
                    `;
                }
            }
            
            resultsDiv.innerHTML = results;
        }

        // Auto-test on page load
        window.addEventListener('load', function() {
            setTimeout(testAllAccounts, 1000);
        });
    </script>
</body>
</html>
